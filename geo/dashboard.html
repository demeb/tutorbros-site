    <main class="tutor-directory-container" style="padding-top: 120px; display: block;">
        
        <div style="background-color: #1e293b; padding: 30px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #334155;">
            <h1 style="color: #fff; margin: 0 0 10px 0; font-size: 2rem;">
                მოგესალმებით , <span id="student-name" style="color: #a78bfa;">...</span>! 👋
            </h1>
            <p style="color: #94a3b8; margin: 0;">აქ მოცემულია თქვენი დაჯავშნილი გაკვეთილები.</p>
        </div>

        <div class="dashboard-grid-container" style="display: flex; gap: 20px;">
            
            <div class="dashboard-lessons-box" style="flex: 2; background-color: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155;">
                <h3 style="color: #fff; margin-top: 0; border-bottom: 1px solid #334155; padding-bottom: 15px;">გაკვეთილების ცხრილი</h3>
                <div id="lessons-container" style="color: #94a3b8; margin-top: 20px;">
                    Loading your lessons...
                </div>
            </div>

            <div class="dashboard-profile-box" style="flex: 1; background-color: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; height: fit-content;">
                <h3 style="color: #fff; margin-top: 0; border-bottom: 1px solid #334155; padding-bottom: 15px;">ჩემი პროფილი</h3>
                <p style="color: #94a3b8; font-size: 0.9rem;"><strong>ელ.ფოსტა:</strong> <span id="student-email">...</span></p>
                <p style="color: #94a3b8; font-size: 0.9rem;"><strong>ტელეფონი:</strong> <span id="student-phone">...</span></p>
                
                <button id="logout-dash-btn" style="width: 100%; background-color: transparent; border: 1px solid #ef4444; color: #ef4444; padding: 10px; border-radius: 8px; margin-top: 20px; cursor: pointer; transition: 0.2s;">
                    Log Out
                </button>

<script>
    const mobileBtn = document.querySelector('.mobile-nav-toggle');
    const mobileDrawer = document.querySelector('.nav-menu-wrapper');

    // Make sure the button actually exists on the page before running the code
    if (mobileBtn && mobileDrawer) {
        mobileBtn.addEventListener('click', () => {
            mobileBtn.classList.toggle('active');
            mobileDrawer.classList.toggle('active');
        });

        // Close the drawer automatically if a user clicks a link
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                mobileBtn.classList.remove('active');
                mobileDrawer.classList.remove('active');
            });
        });
    }
</script>
