<script>
    // === SMART ACTIVE NAV ENGINE ===
    // 1. Get the exact URL the user is currently looking at
    const currentLocation = window.location.href;
    
    // 2. Grab all the navigation links
    const allNavLinks = document.querySelectorAll('.nav-link');
    
    // 3. Loop through them and find the match!
    allNavLinks.forEach(link => {
        // If the link's href exactly matches the current URL...
        if (link.href === currentLocation) {
            // Turn on the glowing blue line!
            link.classList.add('active');
        }
    });
</script>














<script>
    const mobileBtn = document.querySelector('.mobile-nav-toggle');
    const mobileDrawer = document.querySelector('.nav-menu-wrapper');

    // Make sure the button actually exists on the page before running the code
    if (mobileBtn && mobileDrawer) {
        mobileBtn.addEventListener('click', () => {
            mobileBtn.classList.toggle('active');
            mobileDrawer.classList.toggle('active');
        });

        // Close the drawer automatically if a user clicks a link
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                mobileBtn.classList.remove('active');
                mobileDrawer.classList.remove('active');
            });
        });
    }
</script>
