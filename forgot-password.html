<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-navy-full">

    <nav class="navbar sticky-nav">
    <div class="nav-container modern-nav-container">
        
        <!-- 1. The Logo (Always on the Left) -->
        <a href="index.html" class="logo-minimal-premium">
            <img src="images/favicon.png" alt="TB Crest" class="minimal-crest">
            <div class="minimal-text-group">
                <span class="text-tutor">Tutor</span><span class="text-bros">Bros</span>
            </div>
        </a>

        <!-- 2. The 3-Line Hamburger Button (Visible only on Mobile) -->
        <button class="mobile-nav-toggle" aria-label="Toggle Menu">
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
        </button>
        
        <!-- 3. The New Wrapper (Horizontal on Laptop, Drawer on Mobile) -->
        <div class="nav-menu-wrapper">
            
            <div class="nav-links-container">
                <a href="index.html" class="nav-link">Home</a>
                <a href="about.html" class="nav-link">About Us</a>
                <a href="pricing.html" class="nav-link">Pricing</a>
                <a href="find-teacher.html" class="nav-link">Find a Teacher</a>
            </div>
            
            <div class="nav-controls">
                <a href="geo/index.html" class="modern-lang" title="Switch to Georgian">
                    <i class="fas fa-globe"></i>
                    <span>GEO</span>
                </a>
                <div id="user-menu"></div>
            </div>

        </div>

    </div>
</nav>

    <main class="auth-page-wrapper">
        <div class="auth-container">
            <div class="auth-header">
                <h2>Reset Password</h2>
                <p>Enter your email address and we'll send you a secure link to reset your password.</p>
            </div>

            <form id="forgot-password-form" class="auth-form">
                <div class="form-group">
                    <label for="reset-email">Email Address</label>
                    <input type="email" id="reset-email" required placeholder="john@example.com">
                </div>

                <div id="reset-status" style="display: none; padding: 10px; border-radius: 8px; font-size: 0.9rem; text-align: center;"></div>

                <button type="submit" class="auth-btn">Send Reset Link</button>
            </form>

            
        </div>
    </main>

    <script type="module" src="auth-logic.js"></script>





    
    <div class="floating-support">
        <a href="https://wa.me/995579101083" target="_blank" class="support-btn whatsapp-btn" title="Message us on WhatsApp">
            <i class="fab fa-whatsapp"></i>
        </a>
        
        <a href="https://mail.google.com/mail/?view=cm&fs=1&to=tutorbrothers1@gmail.com&su=TutorBros+Support+Request" target="_blank" class="support-btn email-btn" title="Email TutorBros Support">
            <i class="fas fa-envelope"></i>
        </a>
    </div>




<script>
    const mobileBtn = document.querySelector('.mobile-nav-toggle');
    const mobileDrawer = document.querySelector('.nav-menu-wrapper');

    // Make sure the button actually exists on the page before running the code
    if (mobileBtn && mobileDrawer) {
        mobileBtn.addEventListener('click', () => {
            mobileBtn.classList.toggle('active');
            mobileDrawer.classList.toggle('active');
        });

        // Close the drawer automatically if a user clicks a link
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                mobileBtn.classList.remove('active');
                mobileDrawer.classList.remove('active');
            });
        });
    }
</script>


</body>
</html>
